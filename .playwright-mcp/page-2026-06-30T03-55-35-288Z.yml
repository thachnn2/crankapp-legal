                            - generic [ref=e124]:
                              - text: "[English Below] VNG “GÓP SỨC” 5 TỶ ĐỒNG HỖ TRỢ PHÒNG DỊCH COVID-19 Với mong muốn đồng hành cùng cả nước trong “cuộc chiến” đẩy lùi Corona Virus, VNG sẽ đóng góp 5 tỷ VND vào Quỹ hỗ trợ phòng chống dịch của Chính phủ. Là công ty Công nghệ hàng đầu Việt Nam, VNG luôn nỗ lực thực hiện các trách nhiệm xã hội và đem đến những đóng góp tích cực cho cộng đồng. Vì thế, VNG sẽ không chỉ dừng lại ở việc ủng hộ, mà còn luôn đảm bảo chất lượng sản phẩm để tiếp tục phục vụ cho hàng chục triệu khách hàng trên toàn quốc trong suốt mùa dịch. Be safe and be strong, Việt Nam! Embracing challenges, VNG! -- VNG HAS COMMITTED 5 BILLION VND TO FIGHT COVID-19 Aiming to join hands with the whole nation in the \"fight\" against Corona Virus, VNG will commit 5 billion VND to the Vietnamese Government’s COVID-19 prevention support fund. As one of the top technology companies in Vietnam, we always strive to fulfill social responsibilities and bring positive contributions to the community. That’s why VNG would not only support in financial terms but also make sure all of our customers could have the best experience with our services and products throughout this pandemic time. Be safe and be strong, Việt Nam! Embracing challenges, VNG!"
