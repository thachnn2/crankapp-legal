<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrankApp – Legal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .logo {
      width: 80px; height: 80px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-radius: 20px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 4px 24px rgba(99,102,241,0.4);
    }
    h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem; }
    p.tagline { color: #94a3b8; margin-bottom: 3rem; font-size: 1rem; }
    .cards {
      display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2rem;
      width: 240px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-4px);
      border-color: #6366f1;
      box-shadow: 0 8px 32px rgba(99,102,241,0.2);
    }
    .card-icon { font-size: 2rem; margin-bottom: 1rem; }
    .card h2 { font-size: 1.1rem; margin-bottom: 0.4rem; }
    .card p { font-size: 0.85rem; color: #94a3b8; line-height: 1.5; }
    footer {
      margin-top: 4rem;
      font-size: 0.8rem;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="logo">⛪</div>
  <h1>CrankApp</h1>
  <p class="tagline">Church Check-in &amp; Community</p>

  <div class="cards">
    <a class="card" href="terms.html">
      <div class="card-icon">📋</div>
      <h2>Terms of Use</h2>
      <p>Điều khoản sử dụng / Terms &amp; conditions for the app</p>
    </a>
    <a class="card" href="privacy.html">
      <div class="card-icon">🔒</div>
      <h2>Privacy Policy</h2>
      <p>Chính sách bảo mật / How we collect and protect your data</p>
    </a>
  </div>

  <footer>Last updated: June 2026 · CrankApp</footer>
</body>
</html>
