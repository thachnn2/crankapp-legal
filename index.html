<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bước Theo Chân Chúa – Legal</title>
  <meta name="description" content="Legal documents for Bước Theo Chân Chúa — choose your language.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --surface: #f7f4ef; --border: #e5dfd5;
      --muted: #9a8a72; --body: #1a1208;
      --gold: #a07828; --gold-dim: rgba(160,120,40,.10);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--body);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
      gap: 0;
    }
    .logo {
      width: 68px; height: 68px; background: var(--gold-dim);
      border: 1px solid rgba(196,147,56,.3); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem; margin-bottom: 1.25rem;
    }
    h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.3rem, 4vw, 1.8rem);
      font-weight: normal; text-align: center;
      text-wrap: balance; margin-bottom: .35rem;
    }
    .tagline { font-size: .82rem; color: var(--muted); margin-bottom: .2rem; text-align: center; }
    .divider { width: 36px; height: 1px; background: var(--border); margin: 1.75rem auto 2rem; }
    .prompt {
      font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted); margin-bottom: 1rem; text-align: center;
    }
    .lang-cards { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
    .lang-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem 2rem;
      text-decoration: none; color: inherit;
      text-align: center; min-width: 160px;
      transition: border-color .2s, transform .2s;
    }
    .lang-card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .lang-flag { font-size: 2rem; margin-bottom: .6rem; }
    .lang-name {
      font-family: Georgia, serif; font-size: 1rem;
      font-weight: normal; color: var(--body);
      margin-bottom: .25rem;
    }
    .lang-sub { font-size: .75rem; color: var(--muted); }
    footer { margin-top: 3.5rem; font-size: .72rem; color: var(--border); text-align: center; }
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="logo">✝️</div>
  <h1>Bước Theo Chân Chúa</h1>
  <p class="tagline">Điểm danh nhà thờ &amp; Cộng đồng đức tin</p>
  <div class="divider"></div>
  <p class="prompt">Chọn ngôn ngữ / Select language</p>
  <div class="lang-cards">
    <a class="lang-card" href="vn/index.html">
      <div class="lang-flag">🇻🇳</div>
      <div class="lang-name">Tiếng Việt</div>
      <div class="lang-sub">Điều khoản &amp; Bảo mật</div>
    </a>
    <a class="lang-card" href="en/index.html">
      <div class="lang-flag">🇬🇧</div>
      <div class="lang-name">English</div>
      <div class="lang-sub">Terms &amp; Privacy</div>
    </a>
  </div>
  <footer>© 2026 Bước Theo Chân Chúa</footer>
</body>
</html>
