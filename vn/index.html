<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bước Theo Chân Chúa – Pháp lý</title>
  <meta name="description" content="Tài liệu pháp lý của Bước Theo Chân Chúa — Điều khoản Sử dụng và Chính sách Bảo mật bằng tiếng Việt.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #121008; --surface: #1c1810; --border: #2e2318;
      --muted: #8a7660; --body: #e8ddc8; --dim: #b0a088;
      --gold: #c49338; --gold-dim: rgba(196,147,56,.12);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg); color: var(--body);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .back { position: fixed; top: 1.25rem; left: 1.5rem; font-size: .8rem; }
    .back a { color: var(--muted); text-decoration: none; }
    .back a:hover { color: var(--gold); }
    .logo {
      width: 64px; height: 64px; background: var(--gold-dim);
      border: 1px solid rgba(196,147,56,.3); border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; margin-bottom: 1.25rem;
    }
    h1 { font-family: Georgia, serif; font-size: clamp(1.3rem,3vw,1.75rem); font-weight: normal; text-align: center; margin-bottom: .35rem; }
    .sub { font-size: .82rem; color: var(--muted); margin-bottom: 2.5rem; }
    .cards { display: flex; gap: 1.25rem; flex-wrap: wrap; justify-content: center; }
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 1.5rem; width: 200px;
      text-decoration: none; color: inherit;
      transition: border-color .2s, transform .2s;
    }
    .card:hover { border-color: var(--gold); transform: translateY(-3px); }
    .card-icon { font-size: 1.5rem; margin-bottom: .75rem; }
    .card h2 { font-family: Georgia, serif; font-size: .9rem; font-weight: normal; color: var(--body); margin-bottom: .3rem; }
    .card p { font-size: .78rem; color: var(--muted); line-height: 1.5; }
    footer { margin-top: 3rem; font-size: .72rem; color: var(--border); }
    :focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  </style>
</head>
<body>
  <div class="back"><a href="../index.html">← Chọn ngôn ngữ</a></div>
  <div class="logo">✝️</div>
  <h1>Bước Theo Chân Chúa</h1>
  <p class="sub">Tài liệu pháp lý · Tiếng Việt</p>
  <div class="cards">
    <a class="card" href="terms.html">
      <div class="card-icon">📋</div>
      <h2>Điều khoản Sử dụng</h2>
      <p>Quy tắc và điều kiện sử dụng ứng dụng</p>
    </a>
    <a class="card" href="privacy.html">
      <div class="card-icon">🔒</div>
      <h2>Chính sách Bảo mật</h2>
      <p>Cách chúng tôi thu thập và bảo vệ dữ liệu của bạn</p>
    </a>
  </div>
  <footer>Cập nhật tháng 6/2026 · Bước Theo Chân Chúa</footer>
</body>
</html>
